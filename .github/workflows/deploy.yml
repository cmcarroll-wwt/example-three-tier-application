name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  REGION: us-central1
  APP_NAME: todo

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────

  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    outputs:
      api_image: ${{ steps.meta.outputs.api_image }}
      web_image: ${{ steps.meta.outputs.web_image }}
      db_image: ${{ steps.meta.outputs.db_image }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Compute image tags
        id: meta
        run: |
          PROJECT=${{ secrets.GCP_PROJECT_ID }}
          SHA=${{ github.sha }}
          echo "api_image=gcr.io/${PROJECT}/api:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "web_image=gcr.io/${PROJECT}/web:${SHA}"   >> "$GITHUB_OUTPUT"
          echo "db_image=gcr.io/${PROJECT}/db:${SHA}"     >> "$GITHUB_OUTPUT"

      - name: Build & push API
        uses: docker/build-push-action@v6
        with:
          context: src/api
          push: true
          tags: |
            ${{ steps.meta.outputs.api_image }}
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/api:latest
          cache-from: type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/api:cache
          cache-to:   type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/api:cache,mode=max

      - name: Build & push Web
        uses: docker/build-push-action@v6
        with:
          context: src/web
          push: true
          tags: |
            ${{ steps.meta.outputs.web_image }}
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/web:latest
          cache-from: type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/web:cache
          cache-to:   type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/web:cache,mode=max

      - name: Build & push DB (migrations)
        uses: docker/build-push-action@v6
        with:
          context: src/db
          push: true
          tags: |
            ${{ steps.meta.outputs.db_image }}
            gcr.io/${{ secrets.GCP_PROJECT_ID }}/db:latest
          cache-from: type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/db:cache
          cache-to:   type=registry,ref=gcr.io/${{ secrets.GCP_PROJECT_ID }}/db:cache,mode=max

  # ── Terraform ────────────────────────────────────────────────────────────────

  infrastructure:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: src/infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=terraform/${{ github.event.inputs.environment || 'dev' }}"

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ env.REGION }}" \
            -var="app_name=${{ env.APP_NAME }}" \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -var="api_image=${{ needs.build.outputs.api_image }}" \
            -var="web_image=${{ needs.build.outputs.web_image }}" \
            -var="db_image=${{ needs.build.outputs.db_image }}" \
            -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Export Terraform outputs
        id: tf_outputs
        run: |
          echo "job_name=$(terraform output -raw db_url_secret_id | sed 's/db-url/migrate/')" >> "$GITHUB_OUTPUT"
          # The Cloud Run job name follows the naming convention in main.tf: {app_name}-{env}-migrate
          ENV=${{ github.event.inputs.environment || 'dev' }}
          echo "migration_job=${{ env.APP_NAME }}-${ENV}-migrate"  >> "$GITHUB_OUTPUT"

    outputs:
      migration_job: ${{ steps.tf_outputs.outputs.migration_job }}

  # ── Database migrations ──────────────────────────────────────────────────────

  migrate:
    name: Run DB Migrations
    runs-on: ubuntu-latest
    needs: infrastructure
    environment: ${{ github.event.inputs.environment || 'dev' }}

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Execute migration Cloud Run Job
        run: |
          gcloud run jobs execute ${{ needs.infrastructure.outputs.migration_job }} \
            --region ${{ env.REGION }} \
            --wait
